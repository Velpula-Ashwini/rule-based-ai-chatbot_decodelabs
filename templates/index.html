<!DOCTYPE html>
<html>
<head>
    <title>DecodeLabs AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .phone {
            width: 100vw;
            height: 100vh;
            background: #fafafa;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #dbdbdb;
        }

        .back { color: #000; font-size: 22px; cursor: pointer; }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #fd1d1d;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
        }

        .header-info { flex: 1; }

        .header-info h3 {
            color: #000;
            font-size: 15px;
            font-weight: 600;
        }

        .header-info p {
            color: #888;
            font-size: 12px;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            font-size: 20px;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fafafa;
            scrollbar-width: none;
            justify-content: flex-end;
        }

        #chatBox::-webkit-scrollbar { display: none; }

        .message-wrap-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .message-wrap-bot {
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 0 1.5px white, 0 0 0 3px #fd1d1d;
        }

        .user {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            padding: 10px 14px;
            border-radius: 22px 22px 4px 22px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            white-space: nowrap;
        }

        .bot {
            background: #efefef;
            color: #000;
            padding: 10px 14px;
            border-radius: 22px 22px 22px 4px;
            max-width: 100%;
            font-size: 14px;
            line-height: 1.5;
        }

        .time {
            font-size: 10px;
            color: #aaa;
            margin-top: 3px;
            text-align: right;
        }

        .typing-wrap {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .typing-bubble {
            background: #efefef;
            padding: 12px 16px;
            border-radius: 22px 22px 22px 4px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .input-area {
            background: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #dbdbdb;
        }

        .input-wrap {
            flex: 1;
            background: #efefef;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            gap: 10px;
            min-height: 44px;
        }

        .input-icon { color: #555; font-size: 18px; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #000;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            overflow: hidden;
        }

        input::placeholder { color: #aaa; }

        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.1); }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <div class="back">‹</div>
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h3>AI ChatBot</h3>
                <p>Active now</p>
            </div>
            <div class="header-icons">
                <span>📞</span>
                <span>📹</span>
            </div>
        </div>

        <div id="chatBox">
            <div class="message-wrap-bot">
                <div class="bot-avatar">🤖</div>
                <div>
                    <div class="bot">Hey! 👋 I'm your AI assistant. How can I help you?</div>
                    <div class="time">Just now</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <span class="input-icon">😊</span>
                <input type="text" id="userInput" placeholder="Message..." />
                <span class="input-icon">🎤</span>
            </div>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById("chatBox");

            chatBox.innerHTML += `
                <div class="message-wrap-user">
                    <div>
                        <div class="user">${text}</div>
                        <div class="time">${getTime()} ✓✓</div>
                    </div>
                </div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingDiv = document.createElement("div");
            typingDiv.id = "typing";
            typingDiv.className = "typing-wrap";
            typingDiv.innerHTML = `
                <div class="bot-avatar">🤖</div>
                <div class="typing-bubble">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await res.json();
            document.getElementById("typing").remove();

            chatBox.innerHTML += `
                <div class="message-wrap-bot">
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <div class="bot">${data.reply}</div>
                        <div class="time">${getTime()}</div>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
